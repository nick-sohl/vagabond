services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/var/www/html # live-reload code changes
      - /var/www/html/vendor # keeps the container's vendor intact
      - sqlite_data:/var/www/html/database # persistent SQLite storage

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      app:
        condition: service_started
        restart: true

volumes:
  sqlite_data:
