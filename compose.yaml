services:
  app:
    build: .
    volumes:
      - .:/var/www/html # live-reload code changes
      - /var/www/html/vendor # keeps the container's vendor intact
      - sqlite_data:/var/www/html/database # persistent SQLite storage
    # depends_on:
    #  - db

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

volumes:
  sqlite_data:
