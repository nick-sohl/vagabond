server {
    listen 80;
    server_name localhost;
 
    # Document root — where your public/ files live
    root /var/www/html/public;
 
    # Default file to serve
    index index.php;

    # ========================================================
    # Main routing rule: try_files
    # ========================================================
    # For each request, Nginx tries in order:
    #   1. $uri        — does the exact file exist? (e.g. /css/style.css)
    #   2. $uri/       — does the directory exist? (e.g. /images/)
    #   3. /index.php?$query_string — fallback: send to PHP
    #
    # This is the magic that makes clean URLs work.
    # /api/flights doesn't exist as a file, so Nginx falls
    # through to index.php, which handles the routing.
    # ========================================================
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ========================================================
    # PHP handling via FastCGI
    # ========================================================
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
 
        # Increase timeouts for slow queries during development
        fastcgi_read_timeout 300;
    }

    # ========================================================
    # Static file caching
    # ========================================================
    # Nginx serves these directly without touching PHP at all.
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # ========================================================
    # Security: block access to sensitive files
    # ========================================================
    # Prevent direct access to .env, .git, .sqlite, etc.
    # Without this, someone could download your database!
    # ========================================================
    location ~ /\.(?!well-known) {
        deny all;
    }
 
    location ~ \.(sqlite|db|sql|env|log)$ {
        deny all;
    }
}
